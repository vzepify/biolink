
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="dashboard">
  <aside class="sidebar">
    <h2>NeoLink</h2>
    <ul>
      <li onclick="showSection('overview')">Overview</li>
      <li onclick="showSection('profile')">Profile</li>
      <li onclick="showSection('links')">Links</li>
      <li onclick="showSection('appearance')">Appearance</li>
      <li onclick="showSection('settings')">Settings</li>
    </ul>
  </aside>

  <main class="main">
    <section id="overview" class="section active">
      <h1>Dashboard</h1>
      <div class="cards">
        <div class="card"><h3>Views</h3><p id="views">1240</p></div>
        <div class="card"><h3>Clicks</h3><p id="clicks">560</p></div>
        <div class="card"><h3>Links</h3><p id="linkCount">0</p></div>
      </div>
    </section>

    <section id="profile" class="section">
      <h1>Profile Customization</h1>
      <input id="displayName" placeholder="Display Name">
      <textarea id="bio" placeholder="Your bio"></textarea>
      <input id="avatar" placeholder="Avatar Image URL">
      <button onclick="saveProfile()">Save Profile</button>
    </section>

    <section id="links" class="section">
      <h1>Manage Links</h1>
      <div id="linksContainer"></div>
      <button onclick="addLink()">Add Link</button>
    </section>

    <section id="appearance" class="section">
      <h1>Appearance</h1>
      <label>Accent Color</label>
      <input type="color" id="accentColor" value="#7c5cff">

      <label>Background Color</label>
      <input type="color" id="bgColor" value="#111111">

      <label>Card Style</label>
      <select id="cardStyle">
        <option>Glass</option>
        <option>Solid</option>
        <option>Minimal</option>
      </select>

      <button onclick="saveAppearance()">Save Appearance</button>
    </section>

    <section id="settings" class="section">
      <h1>Settings</h1>
      <button onclick="logout()">Logout</button>
    </section>
  </main>
</div>

<script src="js/dashboard.js"></script>
</body>
</html>
