<script>

// Add storage reference
const storage = firebase.storage();

// ============================================================
// AVATAR UPLOAD (DRAG & DROP)
// ============================================================
function setupAvatarUpload() {
  const zone = document.getElementById('avatar-upload-zone');
  zone.addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = 'image/*';
    input.onchange = (e) => { if (e.target.files[0]) uploadAvatar(e.target.files[0]); };
    input.click();
  });
  zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', (e) => {
    e.preventDefault(); zone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) uploadAvatar(file);
  });
}

async function uploadAvatar(file) {
  if (!file.type.startsWith('image/')) { toast('Please upload an image file.', 'error'); return; }
  const uid = currentUser?.uid;
  if (!uid) { toast('You must be logged in to upload.', 'error'); return; }
  const path = `users/${uid}/avatars/${Date.now()}_${file.name}`;
  const uploadTask = storage.ref(path).put(file);
  toast('Uploading avatar…', 'info');
  try {
    await uploadTask;
    const url = await storage.ref(path).getDownloadURL();
    document.getElementById('edit-avatar').value = url;
    updateAvatarPreview(url);
    toast('Avatar uploaded!', 'success');
  } catch(e) {
    toast('Upload failed: ' + e.message, 'error');
  }
}

function updateAvatarPreview(url) {
  const preview = document.getElementById('avatar-preview');
  const placeholder = document.querySelector('#avatar-upload-zone .placeholder');
  if (url) {
    preview.src = url;
    preview.classList.remove('hidden');
    if (placeholder) placeholder.style.display = 'none';
  } else {
    preview.classList.add('hidden');
    if (placeholder) placeholder.style.display = '';
  }
}

// Call this after DOM load
window.addEventListener('DOMContentLoaded', () => {
  setupAvatarUpload();
  // ... rest of your init code (already called inside your existing load handler)
});

// FEATURED VIDEO EMBED
// ============================================================
function getVideoEmbedUrl(url) {
  if (!url) return '';
  // YouTube
  const ytMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|.*\/|embed\/|v\/|watch\?.*v=))([\w-]{11})/);
  if (ytMatch) return 'https://www.youtube.com/embed/' + ytMatch[1];
  // Vimeo
  const vimeoMatch = url.match(/vimeo\.com\/(\d+)/);
  if (vimeoMatch) return 'https://player.vimeo.com/video/' + vimeoMatch[1];
  return ''; // unsupported
}
