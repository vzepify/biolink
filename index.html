<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link id="dynamic-favicon" rel="icon" type="image/png" href="/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
</head>
<body class="no-sidebar">
<div id="custom-cursor"></div>
<div id="cursor-dot"></div>
<div id="particles-js"></div>
<div class="toast-container" id="toast-container"></div>
<a id="floating-edit-btn" class="floating-edit-btn hidden" title="Edit Profile" href="#">&#9998;&#65039;</a>

<aside id="sidebar" class="sidebar hidden">
  <div class="sidebar-logo">
    <div class="logo-icon">&#128279;</div>
    <span class="logo-text">LinkHub</span>
  </div>
  <nav class="nav-section">
    <div class="nav-label">Workspace</div>
    <a class="nav-link active" data-tab="edit" href="#"><span class="nav-icon">&#9998;&#65039;</span> Edit Profile</a>
    <a class="nav-link" data-tab="preview" href="#"><span class="nav-icon">&#128065;&#65039;</span> Preview</a>
    <a class="nav-link" data-tab="analytics" href="#"><span class="nav-icon">&#128202;</span> Analytics</a>
    <div class="nav-label">System</div>
    <a class="nav-link hidden" data-tab="admin" id="sidebar-admin" href="#"><span class="nav-icon">&#128737;&#65039;</span> Admin</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="user-avatar-chip" id="user-av-chip"><span id="user-initial">?</span></div>
      <div class="user-info">
        <div class="user-name-chip" id="user-email-display">&#8212;</div>
        <div class="user-role-chip" id="user-role-display">Member</div>
      </div>
    </div>
    <div class="toggle-row">
      <button class="icon-btn" id="darkModeToggle">&#127769; Theme</button>
      <button class="icon-btn" onclick="logout()">&#128682; Logout</button>
    </div>
  </div>
</aside>

<div id="main-content" class="main-content">

  <div id="auth-wrapper" class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="mark">&#128279;</div>
        <h1>LinkHub</h1>
        <p>Your links, your identity</p>
      </div>
      <div id="login-form">
        <div class="form-row"><label>Email</label><input type="email" id="login-email" placeholder="you@example.com" autocomplete="email"></div>
        <div class="form-row"><label>Password</label><input type="password" id="login-password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" autocomplete="current-password"></div>
        <div id="login-error" class="msg error hidden"></div>
        <button class="btn btn-primary btn-full" onclick="login()">Sign In &#8594;</button>
        <div class="auth-switch"><a href="#" onclick="showForgotPassword()">Forgot password?</a> &nbsp;&#183;&nbsp; <a href="#" onclick="showSignup()">Create account</a></div>
      </div>
      <div id="signup-form" class="hidden">
        <div class="form-row"><label>Email</label><input type="email" id="signup-email" placeholder="you@example.com"></div>
        <div class="form-row"><label>Password</label><input type="password" id="signup-password" placeholder="Min. 6 characters"></div>
        <div id="signup-error" class="msg error hidden"></div>
        <button class="btn btn-primary btn-full" onclick="signup()">Create Account &#8594;</button>
        <div class="auth-switch"><a href="#" onclick="showLogin()">Already have an account? Sign in</a></div>
      </div>
      <div id="forgot-form" class="hidden">
        <div class="form-row"><label>Email</label><input type="email" id="reset-email" placeholder="you@example.com"></div>
        <div id="reset-error" class="msg error hidden"></div>
        <div id="reset-success" class="msg success hidden"></div>
        <button class="btn btn-primary btn-full" onclick="resetPassword()">Send Reset Email</button>
        <div class="auth-switch"><a href="#" onclick="showLogin()">&#8592; Back to Sign In</a></div>
      </div>
    </div>
  </div>

  <div id="dashboard" class="hidden" style="width:100%;display:flex;flex-direction:column;align-items:center;">
    <div class="profile-url-bar">
      <span style="font-size:0.72rem;color:var(--text-muted);font-weight:600;white-space:nowrap;">&#128279; Your page:</span>
      <span class="url-text" id="profile-url-text">Set a username to get your link</span>
      <button class="btn btn-secondary btn-sm" onclick="copyProfileUrl()">Copy</button>
      <button class="btn btn-secondary btn-sm" onclick="openPublicProfile()">Visit</button>
    </div>

    <div id="edit-section" style="width:100%;display:flex;flex-direction:column;align-items:center;">

      <div class="card">
        <div class="card-title"><div class="card-icon">&#128100;</div> Profile Info</div>
        <div class="form-grid">
          <div class="form-row"><label>Username</label><input type="text" id="edit-username" placeholder="yourname"></div>
          <div class="form-row"><label>Display Name</label><input type="text" id="edit-displayname" placeholder="Your Name"></div>
        </div>
        <div class="form-row"><label>Bio / About</label><textarea id="edit-bio" placeholder="Tell the world about yourself..."></textarea></div>

        <div class="form-row">
          <label>Animated Status Texts <span style="font-size:0.65rem;opacity:0.6;">(one per line, cycles with typing effect)</span></label>
          <textarea id="edit-status-texts" rows="3" placeholder="Developer &#10;Coffee addict &#10;Building cool stuff..."></textarea>
        </div>

        <div class="form-grid-3">
          <div class="form-row">
            <label>Pronouns</label>
            <input type="text" id="edit-pronouns" placeholder="they/them">
          </div>
          <div class="form-row">
            <label>Location</label>
            <input type="text" id="edit-location" placeholder="&#128205; Earth">
          </div>
          <div class="form-row">
            <label>Age</label>
            <input type="number" id="edit-age" placeholder="22" min="1" max="150">
          </div>
        </div>

        <div class="form-grid">
          <div class="form-row"><label>Avatar URL / GIF</label><input type="url" id="edit-avatar" placeholder="https://... (supports GIFs!)"></div>
          <div class="form-row"><label>Discord User ID</label><input type="text" id="edit-discordid" placeholder="1234567890..." oninput="updateDiscordPreview()"></div>
        </div>
        <div id="discord-id-hint" class="hint-text" style="margin-top:-0.5rem;margin-bottom:0.75rem;"></div>
        <button class="btn btn-warning btn-sm" onclick="requestVerification()">&#11088; Request Verification</button>
      </div>

      <div class="card">
        <div class="card-title"><div class="card-icon">&#127912;</div> Appearance</div>

        <div class="app-tabs">
          <button class="app-tab active" onclick="showAppTab('themes',this)">&#127775; Themes</button>
          <button class="app-tab" onclick="showAppTab('colors',this)">&#127912; Colors</button>
          <button class="app-tab" onclick="showAppTab('background',this)">&#127757; Background</button>
          <button class="app-tab" onclick="showAppTab('effects',this)">&#10024; Effects</button>
          <button class="app-tab" onclick="showAppTab('animations',this)">&#127798; Motion</button>
          <button class="app-tab" onclick="showAppTab('music',this)">&#127925; Music</button>
          <button class="app-tab" onclick="showAppTab('misc',this)">&#9881;&#65039; Misc</button>
        </div>

        <div id="app-panel-themes" class="app-panel active">
          <label style="margin-bottom:0.6rem;">Quick Presets</label>
          <div class="preset-grid" id="theme-preset-grid"></div>
          <div class="form-grid">
            <div class="form-row">
              <label>Theme Base</label>
              <select id="edit-theme" onchange="syncPresetHighlight()">
                <option value="default">Default Dark</option>
                <option value="neon">Neon Glow</option>
                <option value="galaxy">Galaxy</option>
                <option value="minimal">Minimal Light</option>
                <option value="aurora">Aurora</option>
                <option value="sunset">Sunset</option>
                <option value="ocean">Ocean</option>
                <option value="candy">Candy</option>
                <option value="midnight">Midnight</option>
                <option value="forest">Forest</option>
              </select>
            </div>
            <div class="form-row">
              <label>Font Family</label>
              <select id="edit-font">
                <option value="'Plus Jakarta Sans', sans-serif">Plus Jakarta Sans</option>
                <option value="'Syne', sans-serif">Syne</option>
                <option value="'Courier New', monospace">Monospace</option>
                <option value="Georgia, serif">Serif</option>
                <option value="system-ui, sans-serif">System UI</option>
                <option value="'Comic Sans MS', cursive">Comic Sans</option>
              </select>
            </div>
          </div>
        </div>

        <div id="app-panel-colors" class="app-panel">
          <div class="form-grid">
            <div class="form-row">
              <label>Background Color</label>
              <div class="color-row">
                <input type="color" id="edit-bgcolor" value="#0d0d14" oninput="document.getElementById('bgcolor-hex').value=this.value">
                <input type="text" class="color-hex" id="bgcolor-hex" value="#0d0d14" oninput="document.getElementById('edit-bgcolor').value=this.value">
              </div>
            </div>
            <div class="form-row">
              <label>Text Color</label>
              <div class="color-row">
                <input type="color" id="edit-textcolor" value="#f0f0ff" oninput="document.getElementById('textcolor-hex').value=this.value">
                <input type="text" class="color-hex" id="textcolor-hex" value="#f0f0ff" oninput="document.getElementById('edit-textcolor').value=this.value">
              </div>
            </div>
          </div>
          <div class="form-grid">
            <div class="form-row">
              <label>Gradient Color 2 <span style="font-size:0.6rem;opacity:0.5;">(leave blank for solid)</span></label>
              <div class="color-row">
                <input type="color" id="edit-gradcolor2" value="#1a1a2e" oninput="document.getElementById('gradcolor2-hex').value=this.value">
                <input type="text" class="color-hex" id="gradcolor2-hex" value="#1a1a2e" oninput="document.getElementById('edit-gradcolor2').value=this.value">
              </div>
            </div>
            <div class="form-row">
              <label>Gradient Direction</label>
              <select id="edit-graddir">
                <option value="135deg">Diagonal ↘</option>
                <option value="to bottom">Top → Bottom</option>
                <option value="to right">Left → Right</option>
                <option value="to top left">↖ Diagonal</option>
                <option value="animated">Animated Shift</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <label>RGB Cycling Effect</label>
            <select id="edit-rgb-cycle">
              <option value="none">None</option>
              <option value="border">RGB Border</option>
              <option value="hue">Hue Rotate (Full Card)</option>
            </select>
          </div>
        </div>

        <div id="app-panel-background" class="app-panel">
          <div class="form-row">
            <label>Background Image URL</label>
            <input type="url" id="edit-bgimage" placeholder="https://...">
          </div>
          <div class="form-row">
            <label>Background Video URL <span style="font-size:0.6rem;opacity:0.5;">(mp4/webm direct link)</span></label>
            <input type="url" id="edit-bgvideo" placeholder="https://...video.mp4">
          </div>
          <div class="form-row">
            <label>Background Opacity <span id="bgopacity-val">100%</span></label>
            <input type="range" id="edit-bgopacity" min="10" max="100" value="100" style="width:100%;accent-color:var(--accent);" oninput="document.getElementById('bgopacity-val').textContent=this.value+'%'">
          </div>
          <div class="form-row">
            <label>Glassmorphism Blur <span id="glassblur-val">0px</span></label>
            <input type="range" id="edit-glassblur" min="0" max="24" value="0" style="width:100%;accent-color:var(--accent);" oninput="document.getElementById('glassblur-val').textContent=this.value+'px'">
          </div>
          <div style="display:flex;gap:1.5rem;flex-wrap:wrap;">
            <label class="toggle-label"><input type="checkbox" class="toggle-input" id="edit-glass-card"><span class="toggle-slider"></span> Glassmorphism Card</label>
            <label class="toggle-label"><input type="checkbox" class="toggle-
