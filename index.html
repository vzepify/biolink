<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Links</title>
  <style>
    :root {
      --bg: #f0f2f5;
      --card: white;
      --text: #333;
      --primary: #6c63ff;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: var(--card);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      margin: 2rem 1rem;
    }
    .profile-preview {
      max-width: 600px;
    }
    h1, h2 { text-align: center; margin-bottom: 1rem; }
    input, textarea, select, button {
      width: 100%;
      padding: 0.8rem;
      margin-bottom: 1rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
    }
    button {
      background: var(--primary);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    .link-row { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.5rem; }
    .link-row input { flex: 1; margin-bottom: 0; }
    .delete-link { background: #dc3545; width: auto; padding: 0.5rem 1rem; }
    .error { color: red; text-align: center; margin-bottom: 1rem; }
    .success { color: green; text-align: center; margin-bottom: 1rem; }
    .hidden { display: none !important; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .tabs button { background: #ddd; color: #333; }
    .tabs button.active { background: var(--primary); color: white; }
    .profile-view {
      text-align: center;
      background: inherit;
      padding: 2rem;
      border-radius: var(--radius);
    }
    .profile-view img.avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 1rem;
      border: 3px solid var(--primary);
    }
    .profile-view .links {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin: 1rem 0;
    }
    .profile-view .link-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--primary);
      color: white;
      text-decoration: none;
      padding: 0.8rem;
      border-radius: 8px;
      justify-content: center;
      font-size: 1.1rem;
      transition: opacity 0.2s;
    }
    .profile-view .link-btn:hover { opacity: 0.9; }
    .social-icons { display: flex; gap: 1rem; justify-content: center; margin-top: 1rem; flex-wrap: wrap; }
    .social-icons a { color: inherit; font-size: 1.5rem; text-decoration: none; }
    #logout-btn { background: #6c757d; }
  </style>
</head>
<body>
  <div id="app" class="container">
    <!-- AUTH FORMS (Login / Signup) -->
    <div id="auth-forms">
      <div id="login-form">
        <h2>Login</h2>
        <input type="email" id="login-email" placeholder="Email" autocomplete="email">
        <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
        <p id="login-error" class="error hidden"></p>
        <button onclick="login()">Login</button>
        <p style="text-align:center; margin-top:0.5rem;">
          <a href="#" onclick="showForgotPassword()">Forgot password?</a> | 
          <a href="#" onclick="showSignup()">Create account</a>
        </p>
      </div>
      <div id="signup-form" class="hidden">
        <h2>Sign Up</h2>
        <input type="email" id="signup-email" placeholder="Email">
        <input type="password" id="signup-password" placeholder="Password (min 6 chars)">
        <p id="signup-error" class="error hidden"></p>
        <button onclick="signup()">Sign Up</button>
        <p style="text-align:center; margin-top:0.5rem;">
          <a href="#" onclick="showLogin()">Already have an account? Login</a>
        </p>
      </div>
      <div id="forgot-form" class="hidden">
        <h2>Reset Password</h2>
        <input type="email" id="reset-email" placeholder="Email">
        <p id="reset-error" class="error hidden"></p>
        <p id="reset-success" class="success hidden"></p>
        <button onclick="resetPassword()">Send Reset Email</button>
        <p style="text-align:center; margin-top:0.5rem;">
          <a href="#" onclick="showLogin()">Back to Login</a>
        </p>
      </div>
    </div>

    <!-- DASHBOARD (only when logged in) -->
    <div id="dashboard" class="hidden">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Your Dashboard</h2>
        <button id="logout-btn" onclick="logout()" style="width:auto;">Logout</button>
      </div>
      <div class="tabs">
        <button id="tab-edit" class="active" onclick="switchTab('edit')">Edit Profile</button>
        <button id="tab-preview" onclick="switchTab('preview')">Preview</button>
      </div>

      <div id="edit-section">
        <h3>Profile Details</h3>
        <label>Username (unique)</label>
        <input type="text" id="edit-username" placeholder="yourname">
        <label>Display Name</label>
        <input type="text" id="edit-displayname" placeholder="John Doe">
        <label>Bio</label>
        <textarea id="edit-bio" rows="3" placeholder="Write something..."></textarea>
        <label>Avatar URL</label>
        <input type="url" id="edit-avatar" placeholder="https://...">
        <label>Background Color</label>
        <input type="color" id="edit-bgcolor" value="#f0f2f5">
        <label>Background Image URL (optional)</label>
        <input type="url" id="edit-bgimage" placeholder="https://...">
        <label>Text Color</label>
        <input type="color" id="edit-textcolor" value="#333333">
        <label>Font Family</label>
        <select id="edit-font">
          <option value="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif">Default</option>
          <option value="'Courier New', monospace">Monospace</option>
          <option value="Georgia, serif">Serif</option>
          <option value="'Comic Sans MS', cursive">Comic Sans</option>
        </select>

        <h3>Links</h3>
        <div id="links-container"></div>
        <button onclick="addLink()" style="background:#28a745;">+ Add Link</button>

        <h3>Social Icons (optional)</h3>
        <div id="socials-container"></div>
        <button onclick="addSocial()" style="background:#17a2b8;">+ Add Social Icon</button>

        <p id="save-error" class="error hidden"></p>
        <p id="save-success" class="success hidden"></p>
        <button onclick="saveProfile()" style="margin-top:1rem;">Save Profile</button>
      </div>

      <div id="preview-section" class="hidden">
        <p style="text-align:center; margin-bottom:1rem;">Your public profile:</p>
        <div id="profile-preview-container" class="profile-view"></div>
      </div>
    </div>

    <!-- PUBLIC PROFILE VIEW (triggered by hash) -->
    <div id="public-profile" class="hidden profile-preview container">
      <div id="public-profile-content" class="profile-view"></div>
    </div>
  </div>

  <!-- Firebase SDKs (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <script>
    // ---------- REPLACE WITH YOUR FIREBASE CONFIG ----------
    const firebaseConfig = {
  apiKey: "AIzaSyDwxucvIFlsIUVdL69ZmUm2JHaH-09c6GM",
  authDomain: "biolink111.firebaseapp.com",
  projectId: "biolink111",
  storageBucket: "biolink111.firebasestorage.app",
  messagingSenderId: "783454791937",
  appId: "1:783454791937:web:866804708e4c0ab4b31300",
  measurementId: "G-TRTD5GEX4M"
};
    // -------------------------------------------------------

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ---- State ----
    let currentUser = null;
    let userDoc = null;          // Firestore doc data for logged-in user
    let editingLinks = [];
    let editingSocials = [];

    // ---- Routing: detect public profile via hash #/u/username ----
    window.addEventListener('hashchange', handleRouting);
    window.addEventListener('load', () => {
      handleRouting();
      auth.onAuthStateChanged(user => {
        currentUser = user;
        if (user) {
          loadUserProfile().then(() => showDashboard());
        } else {
          // If not logged in, check if we're on a public profile, else show login
          if (!window.location.hash.startsWith('#/u/')) {
            showLoginForm();
          }
        }
      });
    });

    function handleRouting() {
      const hash = window.location.hash;
      if (hash.startsWith('#/u/')) {
        const username = hash.slice(4); // remove '#/u/'
        loadPublicProfile(username);
      }
    }

    // ---- UI Helpers ----
    function showElement(id) { document.getElementById(id).classList.remove('hidden'); }
    function hideElement(id) { document.getElementById(id).classList.add('hidden'); }
    function showLoginForm() {
      hideElement('signup-form'); hideElement('forgot-form'); hideElement('dashboard'); hideElement('public-profile');
      showElement('auth-forms'); showElement('login-form');
    }
    function showSignup() {
      hideElement('login-form'); hideElement('forgot-form'); hideElement('dashboard'); hideElement('public-profile');
      showElement('auth-forms'); showElement('signup-form');
    }
    function showLogin() { showLoginForm(); }
    function showForgotPassword() {
      hideElement('login-form'); hideElement('signup-form'); hideElement('dashboard'); hideElement('public-profile');
      showElement('auth-forms'); showElement('forgot-form');
    }
    function showDashboard() {
      hideElement('auth-forms'); hideElement('public-profile');
      showElement('dashboard');
      switchTab('edit');
    }

    function switchTab(tab) {
      if (tab === 'edit') {
        showElement('edit-section'); hideElement('preview-section');
        document.getElementById('tab-edit').classList.add('active');
        document.getElementById('tab-preview').classList.remove('active');
      } else {
        hideElement('edit-section'); showElement('preview-section');
        document.getElementById('tab-edit').classList.remove('active');
        document.getElementById('tab-preview').classList.add('active');
        renderPreview();
      }
    }

    // ---- Auth functions ----
    async function login() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errEl = document.getElementById('login-error');
      errEl.classList.add('hidden');
      try {
        await auth.signInWithEmailAndPassword(email, password);
        // onAuthStateChanged will handle redirect
      } catch (e) {
        errEl.textContent = e.message;
        errEl.classList.remove('hidden');
      }
    }

    async function signup() {
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const errEl = document.getElementById('signup-error');
      errEl.classList.add('hidden');
      if (password.length < 6) {
        errEl.textContent = 'Password must be at least 6 characters.';
        errEl.classList.remove('hidden');
        return;
      }
      try {
        await auth.createUserWithEmailAndPassword(email, password);
        // onAuthStateChanged will fire
      } catch (e) {
        errEl.textContent = e.message;
        errEl.classList.remove('hidden');
      }
    }

    async function resetPassword() {
      const email = document.getElementById('reset-email').value.trim();
      const errEl = document.getElementById('reset-error');
      const successEl = document.getElementById('reset-success');
      errEl.classList.add('hidden');
      successEl.classList.add('hidden');
      try {
        await auth.sendPasswordResetEmail(email);
        successEl.textContent = 'Password reset email sent!';
        successEl.classList.remove('hidden');
      } catch (e) {
        errEl.textContent = e.message;
        errEl.classList.remove('hidden');
      }
    }

    async function logout() {
      await auth.signOut();
      currentUser = null;
      userDoc = null;
      showLoginForm();
    }

    // ---- Firestore helpers ----
    async function loadUserProfile() {
      if (!currentUser) return;
      const docRef = db.collection('profiles').doc(currentUser.uid);
      const doc = await docRef.get();
      if (doc.exists) {
        userDoc = doc.data();
        // ensure arrays exist
        if (!userDoc.links) userDoc.links = [];
        if (!userDoc.socials) userDoc.socials = [];
      } else {
        // create default profile
        userDoc = {
          username: '',
          displayName: '',
          bio: '',
          avatar: '',
          bgColor: '#f0f2f5',
          bgImage: '',
          textColor: '#333333',
          font: "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif",
          links: [],
          socials: []
        };
      }
      populateEditForm();
    }

    function populateEditForm() {
      if (!userDoc) return;
      document.getElementById('edit-username').value = userDoc.username || '';
      document.getElementById('edit-displayname').value = userDoc.displayName || '';
      document.getElementById('edit-bio').value = userDoc.bio || '';
      document.getElementById('edit-avatar').value = userDoc.avatar || '';
      document.getElementById('edit-bgcolor').value = userDoc.bgColor || '#f0f2f5';
      document.getElementById('edit-bgimage').value = userDoc.bgImage || '';
      document.getElementById('edit-textcolor').value = userDoc.textColor || '#333333';
      document.getElementById('edit-font').value = userDoc.font || "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";
      // Links
      editingLinks = (userDoc.links || []).map(link => ({ title: link.title, url: link.url, icon: link.icon || '' }));
      renderLinksEditor();
      // Socials
      editingSocials = (userDoc.socials || []).map(s => ({ platform: s.platform, url: s.url, icon: s.icon || '' }));
      renderSocialsEditor();
    }

    function renderLinksEditor() {
      const container = document.getElementById('links-container');
      container.innerHTML = '';
      editingLinks.forEach((link, index) => {
        const div = document.createElement('div');
        div.className = 'link-row';
        div.innerHTML = `
          <input type="text" placeholder="Title" value="${link.title}" onchange="editingLinks[${index}].title=this.value">
          <input type="url" placeholder="URL" value="${link.url}" onchange="editingLinks[${index}].url=this.value">
          <input type="text" placeholder="Icon (emoji)" value="${link.icon}" onchange="editingLinks[${index}].icon=this.value" style="max-width:80px;">
          <button class="delete-link" onclick="removeLink(${index})">X</button>
        `;
        container.appendChild(div);
      });
    }

    function addLink() {
      editingLinks.push({ title: '', url: '', icon: '' });
      renderLinksEditor();
    }

    function removeLink(index) {
      editingLinks.splice(index, 1);
      renderLinksEditor();
    }

    function renderSocialsEditor() {
      const container = document.getElementById('socials-container');
      container.innerHTML = '';
      editingSocials.forEach((social, index) => {
        const div = document.createElement('div');
        div.className = 'link-row';
        div.innerHTML = `
          <input type="text" placeholder="Platform (e.g., Twitter)" value="${social.platform}" onchange="editingSocials[${index}].platform=this.value">
          <input type="url" placeholder="Profile URL" value="${social.url}" onchange="editingSocials[${index}].url=this.value">
          <input type="text" placeholder="Icon emoji" value="${social.icon}" onchange="editingSocials[${index}].icon=this.value" style="max-width:80px;">
          <button class="delete-link" onclick="removeSocial(${index})">X</button>
        `;
        container.appendChild(div);
      });
    }

    function addSocial() {
      editingSocials.push({ platform: '', url: '', icon: '' });
      renderSocialsEditor();
    }

    function removeSocial(index) {
      editingSocials.splice(index, 1);
      renderSocialsEditor();
    }

    async function saveProfile() {
      const errEl = document.getElementById('save-error');
      const successEl = document.getElementById('save-success');
      errEl.classList.add('hidden');
      successEl.classList.add('hidden');

      const newUsername = document.getElementById('edit-username').value.trim();
      if (!newUsername) {
        errEl.textContent = 'Username is required.';
        errEl.classList.remove('hidden');
        return;
      }

      // Check username uniqueness (if changed)
      if (userDoc.username !== newUsername) {
        const usernameDoc = await db.collection('usernames').doc(newUsername).get();
        if (usernameDoc.exists && usernameDoc.data().uid !== currentUser.uid) {
          errEl.textContent = 'Username already taken.';
          errEl.classList.remove('hidden');
          return;
        }
      }

      const profileData = {
        username: newUsername,
        displayName: document.getElementById('edit-displayname').value.trim(),
        bio: document.getElementById('edit-bio').value.trim(),
        avatar: document.getElementById('edit-avatar').value.trim(),
        bgColor: document.getElementById('edit-bgcolor').value,
        bgImage: document.getElementById('edit-bgimage').value.trim(),
        textColor: document.getElementById('edit-textcolor').value,
        font: document.getElementById('edit-font').value,
        links: editingLinks.filter(l => l.title && l.url).map(l => ({ title: l.title, url: l.url, icon: l.icon })),
        socials: editingSocials.filter(s => s.platform && s.url).map(s => ({ platform: s.platform, url: s.url, icon: s.icon })),
        uid: currentUser.uid,
        email: currentUser.email
      };

      try {
        // Save profile
        await db.collection('profiles').doc(currentUser.uid).set(profileData);
        // Save/update username mapping
        if (userDoc.username && userDoc.username !== newUsername) {
          // delete old username mapping
          await db.collection('usernames').doc(userDoc.username).delete();
        }
        await db.collection('usernames').doc(newUsername).set({ uid: currentUser.uid });
        userDoc = profileData;
        successEl.textContent = 'Profile saved!';
        successEl.classList.remove('hidden');
        setTimeout(() => successEl.classList.add('hidden'), 3000);
      } catch (e) {
        errEl.textContent = 'Error: ' + e.message;
        errEl.classList.remove('hidden');
      }
    }

    // ---- Preview & Public Profile Rendering ----
    function renderProfile(data, containerId) {
      const container = document.getElementById(containerId);
      if (!data) {
        container.innerHTML = '<p>User not found.</p>';
        return;
      }
      // Apply custom styles
      container.style.background = data.bgImage ? `url(${data.bgImage}) center/cover no-repeat, ${data.bgColor}` : data.bgColor;
      container.style.color = data.textColor;
      container.style.fontFamily = data.font;

      let html = '';
      if (data.avatar) {
        html += `<img src="${data.avatar}" alt="Avatar" class="avatar" onerror="this.style.display='none'">`;
      }
      html += `<h1 style="color:inherit;">${escapeHtml(data.displayName || data.username)}</h1>`;
      if (data.bio) {
        html += `<p style="white-space:pre-wrap;">${escapeHtml(data.bio)}</p>`;
      }
      // Links
      if (data.links && data.links.length > 0) {
        html += '<div class="links">';
        data.links.forEach(link => {
          const iconPart = link.icon ? `<span>${escapeHtml(link.icon)}</span>` : '';
          html += `<a href="${escapeHtml(link.url)}" target="_blank" rel="noopener" class="link-btn">${iconPart} ${escapeHtml(link.title)}</a>`;
        });
        html += '</div>';
      }
      // Social icons
      if (data.socials && data.socials.length > 0) {
        html += '<div class="social-icons">';
        data.socials.forEach(s => {
          const icon = s.icon || '🔗';
          html += `<a href="${escapeHtml(s.url)}" target="_blank" rel="noopener" title="${escapeHtml(s.platform)}">${icon}</a>`;
        });
        html += '</div>';
      }
      container.innerHTML = html;
    }

    function renderPreview() {
      renderProfile(userDoc, 'profile-preview-container');
    }

    async function loadPublicProfile(username) {
      hideElement('auth-forms');
      hideElement('dashboard');
      showElement('public-profile');
      const contentDiv = document.getElementById('public-profile-content');
      contentDiv.innerHTML = '<p>Loading profile...</p>';
      try {
        // find uid from usernames collection
        const usernameDoc = await db.collection('usernames').doc(username).get();
        if (!usernameDoc.exists) {
          contentDiv.innerHTML = '<p>User not found.</p>';
          return;
        }
        const uid = usernameDoc.data().uid;
        const profileDoc = await db.collection('profiles').doc(uid).get();
        if (!profileDoc.exists) {
          contentDiv.innerHTML = '<p>User not found.</p>';
          return;
        }
        const profileData = profileDoc.data();
        renderProfile(profileData, 'public-profile-content');
      } catch (e) {
        contentDiv.innerHTML = '<p>Error loading profile.</p>';
      }
    }

    function escapeHtml(text) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return String(text).replace(/[&<>"']/g, m => map[m]);
    }
  </script>
</body>
</html>
